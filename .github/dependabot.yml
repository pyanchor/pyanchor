# Dependabot config for pyanchor.
#
# Pre-this-file Dependabot ran on GitHub's default config, which
# discovered all 9 npm directories and grouped them into one PR
# (the `npm_and_yarn` group across `/`, `/examples/*`). That
# behavior is preserved here, just with explicit grouping rules so
# we control the cadence + the patch/minor vs major split.
#
# Pairs with `.github/workflows/dependabot-auto-merge.yml`, which
# enables auto-merge for patch + minor bumps after CI passes.
# Major bumps stay as standalone PRs that require manual review.
#
# Triage history (anchor for future "should we drop this ignore?"):
#
#   v0.30.0 batch (28 PRs) — examples deps majors:
#     - 14× react/react-dom/@types/react/@types/react-dom 18→19:
#       FAILED examples-smoke. Ignored.
#     - 1× vite 5→6 in sveltekit: FAILED. Ignored.
#     - typescript 5→6 / @types/node 22→25 / GitHub Actions: merged.
#     - express 4→5: held → released as v0.31.0.
#
#   v0.31.1 hotfix — round 19 P2:
#     - Removed React-family ignore on the assumption that next@16
#       accepts react 19. Dependabot re-proposed; examples-smoke
#       FAILED again. Conclusion: peer chain is more brittle than
#       the simple "next@16 accepts react 19" check suggests, most
#       likely because Dependabot updates one dep at a time and
#       transient peer states violate ranges. Re-added below.
#     - Removed vite-react vite ignore for the same reason. vite 8
#       proposed → FAILED (plugin-react 4 peer stops at vite 5).
#       Re-added below alongside an explicit plugin-react ignore.
#
# Re-enable anchors for each ignore are documented inline.

version: 2

updates:
  # Top-level package — pyanchor's own runtime + dev deps.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      # GitHub's default is daily. Weekly batches reduce PR noise
      # without delaying security advisories — Dependabot still
      # opens out-of-schedule PRs for vulnerabilities.
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    groups:
      npm-patch-and-minor:
        # Bundle every same-day patch/minor into a single PR per
        # ecosystem. Auto-merge picks this up. Majors stay separate.
        update-types: [patch, minor]
    commit-message: { prefix: "chore(deps)", include: scope }

  # Each example app has its own package.json; Dependabot resolves
  # them independently. Examples that pin React 18 (the Next.js +
  # Vite ones) all share the same ignore set so single-dep React 19
  # bumps don't keep deadlocking examples-smoke.

  # ─── Astro example: no React. Standard config. ──────────────────
  - package-ecosystem: npm
    directory: "/examples/astro-minimal"
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 3
    groups: { examples-patch-and-minor: { update-types: [patch, minor] } }
    commit-message: { prefix: "chore(deps/examples)", include: scope }

  # ─── Next.js examples (5): React-family majors blocked ──────────
  # Re-enable anchor: when react / react-dom / @types/react /
  # @types/react-dom can be bumped to 19 *as a single coordinated
  # PR* (e.g. via grouping or a hand-prepared commit), drop these
  # ignores. Single-package Dependabot PRs cannot satisfy peers.

  - package-ecosystem: npm
    directory: "/examples/nextjs-minimal"
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 3
    groups: { examples-patch-and-minor: { update-types: [patch, minor] } }
    commit-message: { prefix: "chore(deps/examples)", include: scope }
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: "/examples/nextjs-multi-agent"
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 3
    groups: { examples-patch-and-minor: { update-types: [patch, minor] } }
    commit-message: { prefix: "chore(deps/examples)", include: scope }
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: "/examples/nextjs-nextauth-gate"
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 3
    groups: { examples-patch-and-minor: { update-types: [patch, minor] } }
    commit-message: { prefix: "chore(deps/examples)", include: scope }
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: "/examples/nextjs-portfolio-gate"
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 3
    groups: { examples-patch-and-minor: { update-types: [patch, minor] } }
    commit-message: { prefix: "chore(deps/examples)", include: scope }
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: "/examples/nextjs-pr-mode"
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 3
    groups: { examples-patch-and-minor: { update-types: [patch, minor] } }
    commit-message: { prefix: "chore(deps/examples)", include: scope }
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]

  # ─── Vite + React examples (2): React + Vite + plugin-react majors blocked ──
  # Re-enable anchor for vite/plugin-react: when @vitejs/plugin-react's
  # peer range advertises vite 7+ AND vite 7+ has been GA for 1+ month
  # (so the rest of the React tooling chain has caught up).

  - package-ecosystem: npm
    directory: "/examples/vite-react-minimal"
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 3
    groups: { examples-patch-and-minor: { update-types: [patch, minor] } }
    commit-message: { prefix: "chore(deps/examples)", include: scope }
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: "/examples/vite-react-portfolio-gate"
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 3
    groups: { examples-patch-and-minor: { update-types: [patch, minor] } }
    commit-message: { prefix: "chore(deps/examples)", include: scope }
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]

  # ─── SvelteKit example: vite + svelte-vite-plugin majors blocked ──
  # Re-enable anchor: when @sveltejs/vite-plugin-svelte advertises
  # vite 6+ peer support — that's the bottleneck. @sveltejs/adapter-auto
  # majors are fine (already merged 4→7 in v0.31.x batch).
  - package-ecosystem: npm
    directory: "/examples/sveltekit-minimal"
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 3
    groups: { examples-patch-and-minor: { update-types: [patch, minor] } }
    commit-message: { prefix: "chore(deps/examples)", include: scope }
    ignore:
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@sveltejs/vite-plugin-svelte"
        update-types: ["version-update:semver-major"]

  # ─── GitHub Actions: keep CI workflows up to date ───────────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      gh-actions-patch-and-minor:
        update-types: [patch, minor]
    commit-message: { prefix: "chore(deps/ci)", include: scope }
